apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rest-api
    app.kubernetes.io/component: rest-api
    app.kubernetes.io/instance: rest-api
    app.kubernetes.io/name: rest-api
    app.kubernetes.io/part-of: rest-api
    backstage.io/kubernetes-id: rest-api
  name: rest-api
  namespace: rest-api
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rest-api
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rest-api
        deployment: rest-api
        backstage.io/kubernetes-id: rest-api
    spec:
      containers:
      - image: image-registry.openshift-image-registry.svc:5000/rest-api/rest-api@sha256:6aea74a97072aec30071ecf847d0e95dec60e0caee8dafe642a4f3283600e1eb
        imagePullPolicy: Always
        name: rest-api
        ports:
        - containerPort: 8000
          protocol: TCP
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
